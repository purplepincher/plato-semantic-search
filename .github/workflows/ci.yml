name: CI

on:
  push:
    branches: [main, "polish/**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: type-check & test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Test
        # Vitest runs unit + integration + the always-on in-memory e2e suite.
        # The live e2e block is skipped unless PLATO_E2E_URL is set, so no
        # cloud credentials are required here.
        run: npm test
